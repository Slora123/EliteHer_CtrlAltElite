<!DOCTYPE html>
<html>
<head>
    <title>Saaya AR Navigation</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
        .arjs-loader {
            height: 100%; width: 100%; position: absolute; top: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center; color: white;
            font-family: sans-serif;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    <div class="arjs-loader" id="loader">
        <div>Loading Saaya AR Experience...</div>
    </div>
    <a-scene 
        vr-mode-ui="enabled: false" 
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false" 
        renderer="antialias: true; alpha: true"
    >
        <a-camera gps-new-camera="gpsMinDistance: 2"></a-camera>

        <a-assets>
            <a-asset-item id="pointer-model" src="pointer.glb"></a-asset-item>
        </a-assets>

        <a-entity id="ar-points"></a-entity>
    </a-scene>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            const scene = document.querySelector('a-scene');
            const pointsContainer = document.getElementById('ar-points');

            // Parse points from URL: ?points=lat,lng;lat,lng
            const urlParams = new URLSearchParams(window.location.search);
            const pointsStr = urlParams.get('points');

            if (pointsStr) {
                const points = pointsStr.split(';').map(p => p.split(','));
                points.forEach(([lat, lng]) => {
                    if (!lat || !lng) return;
                    const entity = document.createElement('a-entity');
                    entity.setAttribute('gltf-model', '#pointer-model');
                    entity.setAttribute('gps-new-entity-place', `latitude: ${lat}; longitude: ${lng}`);
                    entity.setAttribute('scale', '12 12 12');
                    entity.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear');
                    pointsContainer.appendChild(entity);
                });
            }

            scene.addEventListener('arjs-video-loaded', () => {
                loader.style.display = 'none';
            });
        });
    </script>
</body>
</html>
